<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Panda Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-ocean-blue { background-color: #0077B6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-ocean-blue text-white py-6 shadow-md mb-0">
        <div class="container mx-auto px-4">
            <div class="float-left">
                <a href="/" class="bg-white p-1 rounded-full overflow-hidden w-12 h-12 block hover:opacity-90 transition-opacity float-left mr-4">
                    <img src="/static/img/red_panda_icon.png" alt="Panda Logo" class="w-full h-full object-cover" />
                </a>
                <div class="overflow-hidden">
                    <h1 class="text-2xl font-bold">Red Panda Explorer</h1>
                    <p class="text-sm opacity-90">Discover the magic of Hong Kong's Red Pandas</p>
                </div>
            </div>
            <div class="clear-both"></div>
        </div>
    </header>

    <div class="bg-gray-100 border-b border-gray-200 text-center">
        <div class="container mx-auto px-4 py-2">
            <div class="bg-white shadow-sm p-1 rounded-lg inline-block border border-gray-200">
                <a href="/" class="px-6 py-2 rounded-md font-medium transition-all {% if request.path == '/' or request.path == '/chat' or request.path == '/clear_history' %}bg-ocean-blue text-white{% else %}text-gray-600 hover:bg-gray-100{% endif %} text-sm inline-block">
                    Chat with Expert
                </a>
                <a href="/vision_page" class="px-6 py-2 rounded-md font-medium transition-all {% if request.path == '/vision_page' or request.path == '/vision' %}bg-ocean-blue text-white{% else %}text-gray-600 hover:bg-gray-100{% endif %} text-sm inline-block">
                    Recognize Image
                </a>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Chat Container -->
        <div id="chatWindow" class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
            <!-- Messages Area -->
            <div id="messages" class="overflow-y-auto p-6 h-[500px]">
                <!-- Welcome Message -->
                <div class="mb-4 text-left">
                    <div class="chat-bubble bg-gray-100 text-gray-800 p-4 rounded-2xl rounded-tl-none shadow-sm inline-block">
                        Hello! I'm your natural park guide. Ask me anything about our amazing animals, like our adorable Red Pandas!
                    </div>
                </div>
            </div>

            <div class="border-t border-gray-100 p-4 bg-gray-50">
                <div class="w-full">
                    <div class="float-left w-[calc(100%-100px)]">
                        <form action="/chat" method="POST" class="m-0">
                            <input type="text" name="message" required
                                   class="w-[calc(100%-100px)] border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-ocean-blue focus:border-transparent transition-all"
                                   placeholder="Ask about red pandas...">
                            <button type="submit"
                                    class="bg-ocean-blue text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 active:scale-95 transition-all shadow-md ml-2">
                                Send
                            </button>
                        </form>
                    </div>
                    <div class="float-right">
                        <form action="/clear_history" method="POST" class="m-0">
                            <button type="submit"
                                    class="bg-red-500 hover:bg-red-600 px-4 py-3 rounded-xl font-bold text-white transition-colors shadow-md">
                                Clear
                            </button>
                        </form>
                    </div>
                    <div class="clear-both"></div>
                </div>
                <p id="modeHint" class="text-[10px] text-gray-400 mt-2 px-1 uppercase tracking-wider font-bold">MODE: TEXT EXPLORER</p>
            </div>
        </div>

    </main>

    <footer class="bg-white border-t border-gray-200 py-4 text-center text-gray-500 text-xs">
        <p>&copy; COMM5963 2025-2026 Practice 10</p>
    </footer>

</body>
</html>
