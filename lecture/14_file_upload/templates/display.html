<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center p-4">
    <div class="max-w-xl w-full bg-white shadow-lg rounded-2xl p-8 border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 uppercase text-center">Uploaded Image</h1>

        {% if filename %}
            <div class="border rounded-xl overflow-hidden mb-6">
                <img src="{{ url_for('uploaded_file', filename=filename) }}" alt="Uploaded Image" class="w-full h-auto block">
            </div>
            <p class="text-center text-gray-600 text-sm">Filename: {{ filename }}</p>
        {% else %}
            <div class="text-center py-6 text-gray-400">
                <p>No image found</p>
            </div>
        {% endif %}
        
        <div class="mt-8 text-center">
            <a href="/" class="text-sm text-blue-500 hover:underline">Upload another</a>
        </div>
    </div>
</body>
</html>
