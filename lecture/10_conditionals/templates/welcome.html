{%  extends "layout.html" %}

{%  block content %}
    <h1 class="text-4xl font-extrabold mb-6 text-gray-900">Welcome</h1>
    <div class="bg-gradient-to-br from-blue-50 to-indigo-50 p-6 border border-blue-100 rounded-xl shadow-sm">
        <div class="space-y-3">
            <div class="flex items-center space-x-2">
            {% if role == 'admin' %}
                <p class="text-green-700 font-bold text-lg">Welcome, Administrator!</p>
            {% elif role == 'editor' %}
                <p class="text-orange-700 font-bold text-lg">Welcome, Editor!</p>
            {% else %}
                <p class="text-gray-700 font-bold text-lg">Welcome, Guest!</p>
            {% endif %}
            </div>
        </div>
    </div>
{%  endblock %}
