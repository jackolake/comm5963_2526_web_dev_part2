<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center items-center min-h-screen">
    <div class="max-w-md w-full bg-white shadow-xl rounded-2xl p-8 border border-gray-100 text-center">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-6">Welcome!</h1>
        <div class="bg-blue-50 rounded-lg p-6 mb-8">
            <span class="text-sm text-blue-600 font-semibold uppercase tracking-wider">Logged in as</span>
            <div class="text-4xl font-bold text-blue-800 mt-2">{{ username }}</div>
        </div>
        <a href="/logout" class="inline-block text-gray-500 hover:text-red-600 font-medium transition-colors">
            Logout
        </a>
    </div>
</body>
</html>
